<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FHIR Pseudonymizer Playground" />
    <meta
      name="keywords"
      content="FHIR, Pseudonymization, Playground, Healthcare, Data Privacy"
    />
    <title>FHIR Pseudonymizer Playground</title>
    <base href="./" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <script type="importmap"></script>
  </head>

  <body>
    <script>
      /* Run before first paint to avoid flash of wrong theme */
      (function () {
        var saved = localStorage.getItem('playground-theme');
        var theme = saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <div id="app">
      <svg class="loading-progress">
        <circle r="40%" cx="50%" cy="50%" />
        <circle r="40%" cx="50%" cy="50%" />
      </svg>
      <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
      An unhandled error has occurred.
      <a href="." class="reload">Reload</a>
      <span class="dismiss">🗙</span>
    </div>
    <script src="_content/BlazorMonaco/jsInterop.js"></script>
    <script src="_content/BlazorMonaco/lib/monaco-editor/min/vs/loader.js"></script>
    <script src="_content/BlazorMonaco/lib/monaco-editor/min/vs/editor/editor.main.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
      window.playground = {
        setUrlHash: (hash) => history.pushState(null, '', '#' + hash),
        copyToClipboard: (text) => navigator.clipboard.writeText(text),
        getTheme: () => document.documentElement.dataset.theme || 'light',
        setTheme: (theme) => {
          document.documentElement.dataset.theme = theme;
          localStorage.setItem('playground-theme', theme);
        },
      };
    </script>
  </body>
</html>
